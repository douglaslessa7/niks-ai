<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>NIKS AI — Relatório de Impacto Alimentar (v2)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/niks.css">
<style>
  html, body { margin: 0; padding: 0; background: #EBE7DF; min-height: 100vh; font-family: var(--niks-ui); }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  .stage {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .phone-scroll::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
  <div class="stage">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/result-screen-v2.jsx"></script>

  <script type="text/babel">
    function Phone({ children, width = 390, height = 844 }) {
      return (
        <div style={{
          width, height,
          borderRadius: 54,
          overflow: 'hidden',
          background: '#fff',
          boxShadow: '0 50px 100px rgba(43,39,36,0.18), 0 0 0 10px #1a1a1a, 0 0 0 11px rgba(0,0,0,0.4)',
          position: 'relative',
          display: 'flex', flexDirection: 'column',
        }}>
          <div style={{
            position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
            width: 110, height: 32, borderRadius: 100, background: '#000', zIndex: 50,
          }} />
          {children}
          <div style={{
            position: 'absolute', bottom: 8, left: 0, right: 0,
            display: 'flex', justifyContent: 'center', zIndex: 60, pointerEvents: 'none',
          }}>
            <div style={{ width: 134, height: 5, borderRadius: 100, background: 'rgba(255,255,255,0.85)' }} />
          </div>
        </div>
      );
    }

    function App() {
      const data = SAMPLES_V2.pratofeito;
      return (
        <Phone>
          <MealResultScreen_V2
            data={data}
            photo="assets/meal-photo.png"
            onBack={() => alert('Voltar para início')}
          />
        </Phone>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
